<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BigQuery Release Notes</title>
  <meta name="description" content="Real-time BigQuery release notes viewer with one-click tweet sharing." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <!-- Background particles -->
  <div class="bg-particles" aria-hidden="true">
    <div class="particle p1"></div>
    <div class="particle p2"></div>
    <div class="particle p3"></div>
    <div class="particle p4"></div>
    <div class="particle p5"></div>
  </div>

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="header-brand">
        <div class="brand-icon" aria-hidden="true">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <rect width="28" height="28" rx="8" fill="url(#bq-grad)"/>
            <path d="M8 20L14 8L20 20H8Z" fill="white" opacity="0.9"/>
            <circle cx="14" cy="14" r="3" fill="white"/>
            <defs>
              <linearGradient id="bq-grad" x1="0" y1="0" x2="28" y2="28">
                <stop offset="0%" stop-color="#4285F4"/>
                <stop offset="100%" stop-color="#1A73E8"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <div class="brand-text">
          <h1 class="brand-title">BigQuery <span class="brand-accent">Release Notes</span></h1>
          <p class="brand-sub">Live updates from Google Cloud</p>
        </div>
      </div>

      <div class="header-actions">
        <div class="feed-status" id="feedStatus">
          <span class="status-dot" id="statusDot"></span>
          <span class="status-text" id="statusText">Ready</span>
        </div>
        <button class="btn-refresh" id="refreshBtn" onclick="loadNotes()" aria-label="Refresh release notes">
          <svg class="btn-icon refresh-icon" id="refreshIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"></polyline>
            <polyline points="1 20 1 14 7 14"></polyline>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
          </svg>
          <span class="btn-label">Refresh</span>
        </button>
      </div>
    </div>
  </header>

  <!-- Main content -->
  <main class="main" id="main">

    <!-- Filter bar -->
    <div class="filter-bar" id="filterBar" style="display:none;">
      <div class="filter-inner">
        <div class="filter-group">
          <label class="filter-label" for="categoryFilter">Filter by type</label>
          <div class="filter-chips" id="categoryFilter" role="group" aria-label="Category filters">
            <button class="chip active" data-cat="all" onclick="filterByCategory(this)">All</button>
          </div>
        </div>
        <div class="filter-bar-right">
          <div class="results-count" id="resultsCount"></div>
          <button class="btn-export" id="exportBtn" onclick="exportToCSV()" aria-label="Export visible entries to CSV">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Export CSV
          </button>
        </div>
      </div>
    </div>

    <!-- Cards grid -->
    <div class="cards-grid" id="cardsGrid">

      <!-- Initial empty state -->
      <div class="empty-state" id="emptyState">
        <div class="empty-icon" aria-hidden="true">
          <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
            <circle cx="32" cy="32" r="30" stroke="url(#es-grad)" stroke-width="2" stroke-dasharray="6 4"/>
            <path d="M32 18v14l8 8" stroke="url(#es-grad)" stroke-width="2.5" stroke-linecap="round"/>
            <defs>
              <linearGradient id="es-grad" x1="0" y1="0" x2="64" y2="64">
                <stop offset="0%" stop-color="#4285F4"/>
                <stop offset="100%" stop-color="#34A853"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <h2 class="empty-title">No notes loaded yet</h2>
        <p class="empty-desc">Click <strong>Refresh</strong> to fetch the latest BigQuery release notes.</p>
        <button class="btn-refresh btn-empty" onclick="loadNotes()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"></polyline>
            <polyline points="1 20 1 14 7 14"></polyline>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
          </svg>
          Load Notes
        </button>
      </div>

    </div>
  </main>

  <!-- Toast notification -->
  <div class="toast" id="toast" role="alert" aria-live="polite"></div>

  <!-- Tweet Modal -->
  <div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title-group">
          <svg width="22" height="22" viewBox="0 0 1200 1227" fill="none" class="x-icon">
            <path d="M714.163 519.284L1160.89 0H1055.03L667.137 450.887L357.328 0H0L468.492 681.821L0 1226.37H105.866L515.491 750.218L842.672 1226.37H1200L714.163 519.284ZM569.165 687.828L521.697 619.934L144.011 79.6944H306.615L611.412 515.685L658.88 583.579L1055.08 1150.3H892.476L569.165 687.828Z" fill="currentColor"/>
          </svg>
          <h2 class="modal-heading" id="modalTitle">Share on X (Twitter)</h2>
        </div>
        <button class="modal-close" id="modalClose" onclick="closeModal()" aria-label="Close modal">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>

      <div class="modal-body">
        <label class="tweet-label" for="tweetText">Edit your tweet</label>
        <textarea class="tweet-textarea" id="tweetText" rows="5" maxlength="280" placeholder="Your tweet..."></textarea>
        <div class="tweet-footer">
          <span class="char-count" id="charCount">0 / 280</span>
          <span class="char-warn" id="charWarn"></span>
        </div>
      </div>

      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-tweet" id="tweetBtn" onclick="openTwitter()">
          <svg width="16" height="16" viewBox="0 0 1200 1227" fill="none">
            <path d="M714.163 519.284L1160.89 0H1055.03L667.137 450.887L357.328 0H0L468.492 681.821L0 1226.37H105.866L515.491 750.218L842.672 1226.37H1200L714.163 519.284ZM569.165 687.828L521.697 619.934L144.011 79.6944H306.615L611.412 515.685L658.88 583.579L1055.08 1150.3H892.476L569.165 687.828Z" fill="currentColor"/>
          </svg>
          Post on X
        </button>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
